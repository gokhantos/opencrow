name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Typecheck ──────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - run: bun install --frozen-lockfile

      - name: TypeScript strict check
        run: bunx tsc --noEmit

  # ─── Unit Tests (no DB) ────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - run: bun install --frozen-lockfile

      - name: Run isolated tests (mock.module)
        run: |
          # Tests using mock.module must run in separate processes
          # to prevent Bun's global module cache pollution
          bun test src/tools/git-operations.test.ts --timeout 30000
          bun test src/tools/spawn-agent.test.ts --timeout 30000
          bun test src/tools/manage-agent.test.ts --timeout 30000
          bun test src/tools/cron.test.ts --timeout 30000
          bun test src/tools/cross-agent-memory.test.ts --timeout 30000
          bun test src/monitor/runner.test.ts --timeout 30000

      - name: Run unit tests
        run: |
          # Exclude mock.module tests (ran above) and integration tests (need DB)
          ISOLATED="git-operations|spawn-agent|manage-agent|cron\.test|cross-agent-memory|monitor/runner"
          INTEGRATION="db-query|shell-runner|config/loader|agent/hooks|cron/store|store/token-usage|store/observations|store/messages|store/sessions|store/routing-rules\.test|store/config-overrides|store/agent-overrides|store/workflows\.test|store/sdk-sessions|store/memory\.test|store/summaries\.test"
          find src -name '*.test.ts' \
            | grep -vE "$ISOLATED" \
            | grep -vE "$INTEGRATION" \
            | xargs bun test --timeout 30000 --coverage

  # ─── Integration Tests (with DB) ───────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: opencrow
          POSTGRES_PASSWORD: opencrow
          POSTGRES_DB: opencrow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opencrow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://opencrow:opencrow@127.0.0.1:5432/opencrow

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - run: bun install --frozen-lockfile

      - name: Run integration tests
        run: |
          bun test \
            src/tools/db-query.test.ts \
            src/tools/shell-runner.test.ts \
            src/config/loader.test.ts \
            src/agent/hooks.test.ts \
            src/cron/store.test.ts \
            src/store/token-usage.test.ts \
            src/store/observations.test.ts \
            src/store/messages.test.ts \
            src/store/sessions.test.ts \
            src/store/routing-rules.test.ts \
            src/store/config-overrides.test.ts \
            src/store/agent-overrides.test.ts \
            src/store/workflows.test.ts \
            src/store/sdk-sessions.test.ts \
            src/store/memory.test.ts \
            src/store/summaries.test.ts \
            --timeout 30000 --coverage

  # ─── Build Check ────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - run: bun install --frozen-lockfile

      - name: Verify entry points compile
        run: |
          for f in src/index.ts src/gateway.ts src/entries/core.ts src/entries/agent.ts src/entries/cron.ts src/entries/scraper.ts src/entries/market.ts src/web-index.ts; do
            bun build "$f" --target=bun --no-bundle --outfile /tmp/build-check/$(basename "$f" .ts).js 2>&1
          done
          echo "All entry points compile successfully"

      - name: Build Tailwind CSS
        run: bunx @tailwindcss/cli -i src/web/ui/tailwind.css -o /tmp/tailwind-out.css --minify

  # ─── Security Audit ─────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - run: bun install --frozen-lockfile

      - name: Check for hardcoded secrets
        run: |
          # Scan for potential secrets (API keys, tokens, passwords)
          # Exclude test files, .env.example, and lock files
          PATTERNS='(sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|password\s*[:=]\s*"[^"]{8,}")'
          if grep -rEn "$PATTERNS" src/ prompts/ --include='*.ts' --include='*.md' \
            | grep -v '\.test\.ts' \
            | grep -v 'example' \
            | grep -v 'schema\.' \
            | grep -v 'your-.*-here' \
            | grep -v '\.\.\.'; then
            echo "::warning::Potential hardcoded secrets found. Review the matches above."
          else
            echo "No hardcoded secrets detected"
          fi

      - name: Check for console.log in source
        run: |
          if grep -rn 'console\.log' src/ --include='*.ts' --include='*.tsx' \
            | grep -v '\.test\.ts' \
            | grep -v 'logger\.ts' \
            | grep -v '// eslint-disable'; then
            echo "::warning::console.log statements found in source code. Use the logger instead."
          else
            echo "No stray console.log statements"
          fi
