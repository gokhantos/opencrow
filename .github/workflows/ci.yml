name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Typecheck ──────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - run: bun install --frozen-lockfile || bun install

      - name: TypeScript strict check
        run: bunx tsc --noEmit

  # ─── Unit Tests (no DB) ────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - run: bun install --frozen-lockfile || bun install

      - name: Run isolated tests (mock.module)
        run: |
          # Tests using mock.module must run in separate processes to prevent
          # Bun's global module cache pollution. Selected by the *.isolated.test.ts
          # filename suffix (single source of truth).
          for f in $(find src -name '*.isolated.test.ts'); do
            bun test "$f" --timeout 30000 || exit 1
          done

      - name: Run unit tests
        run: |
          # Unit lane = every *.test.ts EXCEPT the integration (*.integration.test.ts,
          # need a DB) and isolated (*.isolated.test.ts, ran above) lanes.
          find src -name '*.test.ts' \
            -not -name '*.integration.test.ts' \
            -not -name '*.isolated.test.ts' \
            | xargs bun test --timeout 30000 --coverage

  # ─── Integration Tests (with DB) ───────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: opencrow
          POSTGRES_PASSWORD: opencrow
          POSTGRES_DB: opencrow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opencrow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://opencrow:opencrow@127.0.0.1:5432/opencrow

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - run: bun install --frozen-lockfile || bun install

      - name: Run integration tests
        run: |
          # Integration lane = every *.integration.test.ts (DB-backed).
          find src -name '*.integration.test.ts' \
            | xargs bun test --timeout 30000 --coverage

  # ─── Build Check ────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - run: bun install --frozen-lockfile || bun install

      - name: Verify entry points compile
        run: |
          # Build every real entry point and fail fast on the first error
          # (ModuleNotFound etc.). Globbing src/entries/*.ts keeps this in sync
          # as entries are added or removed.
          for f in src/index.ts src/web-index.ts src/entries/*.ts; do
            echo "building $f"
            bun build "$f" --target=bun --no-bundle >/dev/null || exit 1
          done
          echo "All entry points compile successfully"

      - name: Build Tailwind CSS
        run: bunx @tailwindcss/cli -i src/web/ui/tailwind.css -o /tmp/tailwind-out.css --minify

  # ─── Lint ───────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - run: bun install --frozen-lockfile || bun install

      - name: Biome lint
        run: bun run lint

  # ─── Security Audit ─────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - run: bun install --frozen-lockfile || bun install

      - name: Check for hardcoded secrets
        run: |
          # Scan for potential secrets (API keys, tokens, passwords)
          # Exclude test files, .env.example, and lock files
          PATTERNS='(sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|password\s*[:=]\s*"[^"]{8,}")'
          if grep -rEn "$PATTERNS" src/ prompts/ --include='*.ts' --include='*.md' \
            | grep -v '\.test\.ts' \
            | grep -v 'example' \
            | grep -v 'schema\.' \
            | grep -v 'your-.*-here' \
            | grep -v '\.\.\.'; then
            echo "::error::Potential hardcoded secrets found. Review the matches above."
            exit 1
          else
            echo "No hardcoded secrets detected"
          fi

      - name: Check for console.log in source
        run: |
          # Fail on stray console.log. Known-safe exclusions: test files, the
          # logger itself, and the interactive CLI (src/cli/*) which prints
          # user-facing output to the terminal by design.
          if grep -rn 'console\.log' src/ --include='*.ts' --include='*.tsx' \
            | grep -v '\.test\.ts' \
            | grep -v 'logger\.ts' \
            | grep -v '/cli/' \
            | grep -v '// eslint-disable'; then
            echo "::error::console.log statements found in source code. Use the logger instead."
            exit 1
          else
            echo "No stray console.log statements"
          fi
