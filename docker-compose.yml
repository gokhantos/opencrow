services:
  postgres:
    image: postgres:17-alpine
    # Run the native arm64 image. The Colima VM is aarch64 (Apple Silicon); without
    # this pin Docker may resolve the amd64 manifest and silently emulate Postgres
    # via Rosetta — the exact overhead we removed by going native. Keep it explicit.
    platform: linux/arm64
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: opencrow
      POSTGRES_PASSWORD: opencrow
      POSTGRES_DB: opencrow
    # ---------------------------------------------------------------------------
    # DEV/LOCAL Postgres tuning for a throwaway dev DB. These flags trade
    # durability for far less CPU/I/O. SAFE ONLY for a dev DB that can be
    # recreated from migrations — DO NOT ship these to a production deployment.
    # ---------------------------------------------------------------------------
    command:
      - "postgres"
      # Pool sizing: each process holds its own pool (cron 10, web/agent/sige 5,
      # scraper 2, core/ingestion 3). Idle-close is now disabled (see
      # DEFAULT_IDLE_TIMEOUT_SEC in store/db.ts), so a saturated pool stays
      # saturated for the process lifetime instead of draining at rest. Worst
      # case across the full scraper set + a few agents approaches ~56, so 100
      # (the standard Postgres default) gives honest headroom. On native arm64
      # idle connections are essentially free; the old 2000 was the real waste.
      - "-c"
      - "max_connections=100"
      # Don't block COMMIT on WAL flush to disk. Biggest single CPU/I/O win under
      # emulation. Risk: a crash can lose the last few committed txns (dev only).
      - "-c"
      - "synchronous_commit=off"
      # Skip fsync entirely — no forced disk syncs. Risk: an OS/VM crash mid-write
      # can corrupt the data dir. Acceptable: this DB is disposable (recreate via
      # `docker compose down -v` + migrations). NEVER set in prod.
      - "-c"
      - "fsync=off"
      # No full-page images in WAL (paired with fsync=off — only meaningful with
      # fsync on). Cuts WAL write volume and CPU. Risk: torn pages on crash.
      - "-c"
      - "full_page_writes=off"
      # Small dev working set; 128MB is plenty and keeps VM RAM pressure low.
      - "-c"
      - "shared_buffers=128MB"
      # Per-sort/hash memory. 8MB suits the app's small dev queries without
      # inflating peak memory across connections.
      - "-c"
      - "work_mem=8MB"
      # Keep autovacuum ON (prevents bloat) but relax the cost limit so its I/O
      # bursts don't spike emulated CPU; raising the delay throttles it gently.
      - "-c"
      - "autovacuum_vacuum_cost_delay=20ms"
    # Bound CPU so a runaway Postgres can't monopolize the 8-vCPU emulated VM and
    # starve the Mac. At ~38 txn/s of real work, 2 CPUs is ample headroom; the
    # idle ~674% spike was emulation overhead, not logical load. deploy.resources
    # is honored by `docker compose up` (Compose v2+/v5) under Colima — verified
    # that limits.cpus maps to the container's NanoCpus.
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencrow -d opencrow"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.2
    # Native arm64 (see postgres note) — avoid silent Rosetta emulation.
    platform: linux/arm64
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    # Cap so vector indexing bursts can't monopolize the emulated VM (dev/local).
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    restart: unless-stopped

  # Mem0 sidecar — exposes the /v1/memories/ contract the SIGE client expects,
  # backed by Qdrant (vectors) + embedded Kùzu (relations) + Ollama (embeddings)
  # + the app's internal Agent-SDK LLM (extraction). See mem0-server/app.py.
  mem0:
    build: ./mem0-server
    depends_on:
      qdrant:
        condition: service_started
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      # Inbound bearer-token auth for /v1/memories/* (mem0ai ships none —
      # GHSA-jfv9-68m5-gjjr). Same shared internal token the app sends; the app
      # resolves it from OPENCROW_INTERNAL_TOKEN (.env) into its SIGE mem0 config.
      # If unset, the sidecar fails closed (503 on guarded routes), never open.
      MEM0_API_TOKEN: ${OPENCROW_INTERNAL_TOKEN}
      # Graph store: embedded Kùzu (in-process, no server/JVM), persisted to /data.
      MEM0_GRAPH_PROVIDER: kuzu
      MEM0_GRAPH_DB: /data/kuzu
      # Extraction LLM: HOSTED Alibaba token-plan DeepSeek (deepseek-v4-flash) via
      # its OpenAI-compatible endpoint. Routed through the `openai` provider
      # because only the OpenAI path forwards `tools` — required for graph
      # entity/relation extraction.
      #
      # deepseek-v4-flash is a *reasoning* model and would stall mem0's always-on
      # graph phase (hidden chain-of-thought; sequential tool-calls never return).
      # We disable thinking with MEM0_LLM_DISABLE_THINKING=true, which makes the
      # sidecar inject `enable_thinking: false` on every completion (verified: it
      # then tool-calls with zero reasoning tokens). Extraction is fully hosted —
      # the local Ollama chat model (gemma) has been decommissioned; only the
      # EMBEDDER below still uses host Ollama (nomic-embed-text).
      #
      # FALLBACK — hosted Zhipu GLM (glm-5.1): plain text-gen (no thinking flag
      # needed), same endpoint + ${MEM0_LLM_API_KEY}. (No local-LLM fallback: the
      # gemma chat model was removed; embeddings remain local.)
      MEM0_LLM_PROVIDER: openai
      MEM0_LLM_MODEL: deepseek-v4-flash
      MEM0_LLM_BASE_URL: https://token-plan.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1
      MEM0_LLM_API_KEY: ${MEM0_LLM_API_KEY}
      # Reasoning/thinking OFF (deepseek-v4-flash is a reasoning model; thinking
      # stalls the graph phase). The sidecar injects enable_thinking=false.
      MEM0_LLM_DISABLE_THINKING: "true"
      OPENAI_API_KEY: ${MEM0_LLM_API_KEY}
      OPENAI_BASE_URL: https://token-plan.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1
      OPENAI_API_BASE: https://token-plan.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1
      # Embeddings stay on host-native Ollama (nomic-embed-text, 768-dim).
      MEM0_OLLAMA_URL: http://host.docker.internal:11434
      MEM0_EMBED_MODEL: nomic-embed-text:latest
      MEM0_EMBED_DIMS: "768"
      MEM0_COLLECTION: sige_mem0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - mem0_data:/data
    ports:
      # Loopback-only; the app reaches it in-network at http://mem0:8000.
      - "127.0.0.1:8050:8000"
    # Cap the extraction/embedding sidecar (dev/local).
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    restart: unless-stopped

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      mem0:
        condition: service_started
    # Optional provider keys (OPENROUTER_API_KEY, TELEGRAM_BOT_TOKEN, …) and the
    # generated web/internal tokens are read from .env; the values below point the
    # app at the other containers by service name and override the loopback defaults.
    env_file: .env
    environment:
      DATABASE_URL: postgres://opencrow:opencrow@postgres:5432/opencrow
      QDRANT_URL: http://qdrant:6333
      # Enable SIGE and point it at the in-network mem0 sidecar (consumed via the
      # OPENCROW_SIGE_* env overrides in src/config/loader.ts).
      OPENCROW_SIGE_ENABLED: "true"
      OPENCROW_SIGE_MEM0_URL: http://mem0:8000
      # Bind the dashboard to all interfaces *inside* the container so the
      # published port works; host exposure stays loopback-only (see ports).
      OPENCROW_WEB_HOST: 0.0.0.0
    ports:
      # Loopback-only on the host — Tailscale `serve` proxies this onto the tailnet.
      - "127.0.0.1:48080:48080"
    extra_hosts:
      # Reach host-native Ollama (embeddings) at host.docker.internal:11434.
      - "host.docker.internal:host-gateway"
    # The app runs the orchestrator + web + cron + agents/scrapers as child
    # processes; give it the largest slice but still bounded so it can't starve
    # the host (dev/local).
    #
    # Memory: 8G (was 4G). During the SIGE "expert-game" phase the app spawns
    # ~4 parallel Claude Code (Agent SDK) subprocesses on top of the bun parent;
    # the combined RSS spiked past the old 4G cap and the kernel OOM-killer
    # SIGKILLed the subprocesses ("Claude Code process terminated by signal
    # SIGKILL"), degrading idea-generation sessions. 8G gives that fan-out
    # honest headroom. NOTE: this assumes a 16 GiB Colima VM (bump from 8 → 16:
    # `colima stop && colima start --memory 16`). Per-service limits then total
    # 8 (app) + 2 (qdrant) + 2 (mem0) + 1 (postgres) = 13G < 16G, leaving ~3G
    # for VM/runtime overhead. Do not push the app past 8G without raising the
    # VM, or you reintroduce the overcommit that caused the OOM.
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
    # Liveness for the whole app: the core orchestrator serves :48081
    # /internal/health (unauthenticated). A wedged orchestrator/crash-loop fails
    # this and surfaces as `unhealthy` rather than a silently-up container.
    healthcheck:
      test:
        - "CMD"
        - "bun"
        - "-e"
        - "fetch('http://127.0.0.1:48081/internal/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    # In-container graceful shutdown budget is 10s (supervisor SHUTDOWN_TIMEOUT_MS
    # + child-lifecycle GRACEFUL_SHUTDOWN_MS). The Compose default stop grace is
    # also 10s, leaving zero slack for the supervisor to drain hooks AND kill
    # children before SIGKILL. Give honest headroom (>10s) so graceful shutdown
    # actually completes. `init: true` reaps the child processes the orchestrator
    # spawns (PID 1 in a container does not reap by default → zombies).
    stop_grace_period: 30s
    init: true
    restart: unless-stopped

volumes:
  pg_data:
  qdrant_data:
  mem0_data:
